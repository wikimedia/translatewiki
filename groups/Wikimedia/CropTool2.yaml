---
BASIC:
  id: croptool2
  label: CropTool2
  icon: wiki://CropTool2-new-icon.svg
  description: "{{Special:MyLanguage/Translations:Group descriptions/croptool2/en}}"
  namespace: NS_WIKIMEDIA
  class: FileBasedMessageGroup
  support:
    url: https://github.com/wpmed/croptool2/issues
    params:
      title: Translation issue with message %MESSAGE%
      body: "\n\nMessage URL: %MESSAGE_URL%"

MANGLER:
  class: StringMatcher
  prefix: croptoo2l-
  patterns:
    - "*"

FILES:
  format: Json
  sourcePattern: "%GROUPROOT%/croptool2/public_html/i18n/%CODE%.json"

VALIDATORS:
  - id: InsertableRegex
    enforce: false
    insertable: true
    params: /{{[a-zA-Z_0-9]+}}/

INSERTABLES:
  - class: HtmlTagInsertablesSuggester